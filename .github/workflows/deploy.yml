name: Upload Data Folder to S3

on:
  push:
    branches:
      - main
      - master
      # Only trigger the workflow if files inside the Data folder change
    paths:
      - 'Data/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1 # Change to your bucket's region

    # Syncs only the contents of the Data folder to your S3 bucket
    - name: Sync Data Folder to S3
      run: |
        aws s3 sync ./Data s3://your-bucket-name/Data --delete
